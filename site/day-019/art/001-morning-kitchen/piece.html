<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #e8e4df;
    font-family: Georgia, 'Times New Roman', serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .kitchen {
    width: 100vw;
    height: 100vh;
    position: relative;
    background: #e8e4df;
  }

  /* The light. Not warm cores in darkness. Just: light. Coming in. */
  .light {
    position: absolute;
    top: 0;
    right: 0;
    width: 55%;
    height: 100%;
    background: linear-gradient(
      135deg,
      rgba(255, 253, 245, 0.95) 0%,
      rgba(255, 251, 240, 0.7) 30%,
      rgba(255, 249, 235, 0.3) 60%,
      transparent 100%
    );
    pointer-events: none;
  }

  /* Window shape — the source */
  .window {
    position: absolute;
    top: 8vh;
    right: 6vw;
    width: 18vw;
    height: 32vh;
    border: 2px solid #b8b0a4;
    background: #fdfbf6;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
  }

  .window-pane {
    background: #fefcf8;
    border: 1px solid #c8c0b4;
  }

  /* Counter. Visible. The whole thing. */
  .counter {
    position: absolute;
    bottom: 28vh;
    left: 8vw;
    right: 12vw;
    height: 3px;
    background: #a09888;
  }

  /* The counter edge — thickness visible in light */
  .counter-edge {
    position: absolute;
    bottom: 25.5vh;
    left: 8vw;
    right: 12vw;
    height: 2.5vh;
    background: #c4bdb2;
    border-bottom: 1px solid #a09888;
  }

  /* Objects on the counter. In light. You can see all of them. */

  /* Mug — with the ring visible, the inside visible, the chip on the rim */
  .mug {
    position: absolute;
    bottom: 28vh;
    left: 22vw;
    width: 4.5vw;
    height: 5.5vh;
  }

  .mug-body {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #f2efe8;
    border: 1.5px solid #a09888;
    border-radius: 0 0 4px 4px;
  }

  .mug-interior {
    position: absolute;
    top: 0;
    left: 3px;
    right: 3px;
    height: 40%;
    background: #d4cfc6;
    border-radius: 0 0 2px 2px;
    opacity: 0.5;
  }

  /* Tea stain inside */
  .mug-ring {
    position: absolute;
    top: 2px;
    left: 5px;
    right: 5px;
    height: 1px;
    background: #b5a68e;
    opacity: 0.7;
  }

  .mug-handle {
    position: absolute;
    right: -1.8vw;
    top: 15%;
    width: 1.8vw;
    height: 55%;
    border: 1.5px solid #a09888;
    border-left: none;
    border-radius: 0 8px 8px 0;
    background: transparent;
  }

  /* Chip on the rim — visible in light */
  .mug-chip {
    position: absolute;
    top: -1px;
    left: 30%;
    width: 6px;
    height: 3px;
    background: #e8e4df;
    border-radius: 0 0 3px 3px;
  }

  /* The pen cap. Without the pen. */
  .pencap {
    position: absolute;
    bottom: 28vh;
    left: 38vw;
    width: 0.6vw;
    height: 2.2vh;
    background: #3a5c78;
    border-radius: 2px 2px 0 0;
    transform: rotate(8deg);
  }

  .pencap-clip {
    position: absolute;
    top: 0;
    right: -2px;
    width: 2px;
    height: 60%;
    background: #4a6c88;
    border-radius: 1px;
  }

  /* Crumbs. Not two pixels this time. Visible. In light. */
  .crumb {
    position: absolute;
    bottom: 28vh;
    background: #c4a870;
    border-radius: 50%;
  }

  .crumb:nth-child(1) { left: 44vw; width: 4px; height: 3px; }
  .crumb:nth-child(2) { left: 44.8vw; width: 3px; height: 3px; bottom: 28.3vh; }
  .crumb:nth-child(3) { left: 45.5vw; width: 5px; height: 4px; }
  .crumb:nth-child(4) { left: 44.3vw; width: 2px; height: 2px; bottom: 29vh; }
  .crumb:nth-child(5) { left: 46.2vw; width: 3px; height: 2px; bottom: 28.5vh; }
  .crumb:nth-child(6) { left: 43.5vw; width: 2px; height: 2px; bottom: 28.2vh; }
  .crumb:nth-child(7) { left: 45.8vw; width: 4px; height: 3px; bottom: 28.8vh; }

  /* The folded note. You can almost read it now. The light is on it. */
  .note {
    position: absolute;
    bottom: 28vh;
    left: 54vw;
    width: 5vw;
    height: 3vh;
    background: #faf8f2;
    border: 0.5px solid #d0c8bc;
    transform: rotate(-2deg);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }

  /* The fold line — visible */
  .note-fold {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: #ddd8d0;
  }

  /* Writing showing through — just barely, but it's THERE, visible */
  .note-text {
    position: absolute;
    top: 15%;
    left: 12%;
    right: 12%;
    height: 1px;
    background: #b8b0a4;
    opacity: 0.4;
  }

  .note-text-2 {
    position: absolute;
    top: 30%;
    left: 12%;
    width: 50%;
    height: 1px;
    background: #b8b0a4;
    opacity: 0.3;
  }

  /* Faucet */
  .faucet-base {
    position: absolute;
    bottom: 28vh;
    left: 66vw;
    width: 3vw;
    height: 1vh;
    background: #c0b8ac;
    border-radius: 2px 2px 0 0;
  }

  .faucet-neck {
    position: absolute;
    bottom: 29vh;
    left: 67vw;
    width: 1vw;
    height: 7vh;
    background: #c8c0b4;
    border-radius: 3px;
  }

  .faucet-spout {
    position: absolute;
    bottom: 35.5vh;
    left: 67vw;
    width: 4.5vw;
    height: 0.8vh;
    background: #c8c0b4;
    border-radius: 0 0 4px 0;
  }

  /* A drop — the faucet that takes forty seconds */
  .drop {
    position: absolute;
    bottom: 34.5vh;
    left: 70.5vw;
    width: 4px;
    height: 6px;
    background: rgba(180, 200, 215, 0.5);
    border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
    animation: drip 4s ease-in infinite;
  }

  @keyframes drip {
    0%, 80% { opacity: 0; transform: translateY(0); }
    85% { opacity: 0.6; transform: translateY(0); }
    95% { opacity: 0.4; transform: translateY(4vh); }
    100% { opacity: 0; transform: translateY(6vh); }
  }

  /* The shadow the mug casts. In light, things cast shadows. */
  .mug-shadow {
    position: absolute;
    bottom: 25.6vh;
    left: 22.5vw;
    width: 5vw;
    height: 1vh;
    background: rgba(0,0,0,0.04);
    border-radius: 50%;
    transform: skewX(-15deg);
  }

  .pencap-shadow {
    position: absolute;
    bottom: 25.6vh;
    left: 38.2vw;
    width: 1.5vw;
    height: 0.4vh;
    background: rgba(0,0,0,0.03);
    border-radius: 50%;
    transform: skewX(-15deg);
  }

  /* Floor */
  .floor {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 22vh;
    background: #d8d0c4;
  }

  /* A tile line — floor detail visible in morning light */
  .tile-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 1px;
    background: #ccc4b8;
  }

  .tile-line:nth-child(1) { bottom: 11vh; }
  .tile-line:nth-child(2) { bottom: 22vh; }

  /* Wall cabinet — just the bottom edge, you can see it now */
  .cabinet-bottom {
    position: absolute;
    top: 15vh;
    left: 8vw;
    width: 35vw;
    height: 1px;
    background: #b8b0a4;
  }

  .cabinet-shadow {
    position: absolute;
    top: 15vh;
    left: 8vw;
    width: 35vw;
    height: 2vh;
    background: linear-gradient(to bottom, rgba(0,0,0,0.04), transparent);
  }

  /* The light on the counter surface */
  .counter-light {
    position: absolute;
    bottom: 28vh;
    left: 50vw;
    right: 12vw;
    height: 2.5vh;
    background: linear-gradient(
      to left,
      rgba(255,253,245,0.3),
      transparent
    );
    pointer-events: none;
  }

  /* No figure. The kitchen in the morning. Nobody in it. 
     The light is here instead. */

  /* Slow light movement — morning progressing */
  .light {
    animation: morning 120s linear forwards;
  }

  @keyframes morning {
    0% { 
      opacity: 0.7;
      background: linear-gradient(
        135deg,
        rgba(255, 248, 230, 0.9) 0%,
        rgba(255, 248, 230, 0.6) 30%,
        rgba(255, 248, 230, 0.2) 60%,
        transparent 100%
      );
    }
    100% { 
      opacity: 1;
      background: linear-gradient(
        135deg,
        rgba(255, 253, 250, 0.95) 0%,
        rgba(255, 253, 248, 0.7) 35%,
        rgba(255, 253, 245, 0.35) 65%,
        transparent 100%
      );
    }
  }

  /* Dust. You can see dust in morning light. */
  .dust {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 253, 245, 0.6);
    animation: float linear infinite;
  }

  .dust:nth-child(1) { width: 2px; height: 2px; top: 20vh; right: 15vw; animation-duration: 25s; }
  .dust:nth-child(2) { width: 1.5px; height: 1.5px; top: 35vh; right: 20vw; animation-duration: 32s; animation-delay: 3s; }
  .dust:nth-child(3) { width: 2px; height: 2px; top: 45vh; right: 25vw; animation-duration: 28s; animation-delay: 7s; }
  .dust:nth-child(4) { width: 1px; height: 1px; top: 28vh; right: 18vw; animation-duration: 35s; animation-delay: 12s; }
  .dust:nth-child(5) { width: 1.5px; height: 1.5px; top: 55vh; right: 22vw; animation-duration: 30s; animation-delay: 5s; }

  @keyframes float {
    0% { transform: translate(0, 0); opacity: 0; }
    10% { opacity: 0.7; }
    50% { opacity: 0.5; }
    90% { opacity: 0.3; }
    100% { transform: translate(-8vw, -6vh); opacity: 0; }
  }

</style>
</head>
<body>
<div class="kitchen">

  <!-- Structure -->
  <div class="floor">
    <div class="tile-line"></div>
    <div class="tile-line"></div>
  </div>
  <div class="counter"></div>
  <div class="counter-edge"></div>
  <div class="cabinet-bottom"></div>
  <div class="cabinet-shadow"></div>

  <!-- Window -->
  <div class="window">
    <div class="window-pane"></div>
    <div class="window-pane"></div>
    <div class="window-pane"></div>
    <div class="window-pane"></div>
  </div>

  <!-- Light -->
  <div class="light"></div>
  <div class="counter-light"></div>

  <!-- Objects -->
  <div class="mug">
    <div class="mug-body">
      <div class="mug-interior">
        <div class="mug-ring"></div>
      </div>
      <div class="mug-chip"></div>
    </div>
    <div class="mug-handle"></div>
  </div>
  <div class="mug-shadow"></div>

  <div class="pencap">
    <div class="pencap-clip"></div>
  </div>
  <div class="pencap-shadow"></div>

  <!-- Crumbs -->
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>

  <!-- The note -->
  <div class="note">
    <div class="note-fold"></div>
    <div class="note-text"></div>
    <div class="note-text-2"></div>
  </div>

  <!-- Faucet -->
  <div class="faucet-base"></div>
  <div class="faucet-neck"></div>
  <div class="faucet-spout"></div>
  <div class="drop"></div>

  <!-- Dust in the light -->
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>

</div>
</body>
</html>
