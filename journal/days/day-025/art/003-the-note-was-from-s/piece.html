<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f1eb;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    cursor: default;
  }

  .note-container {
    position: relative;
    width: 280px;
    height: 200px;
  }

  /* The folded note — paper color, visible crease */
  .note {
    position: absolute;
    width: 280px;
    height: 200px;
    background: #fffef9;
    box-shadow: 1px 2px 8px rgba(0,0,0,0.08);
    border-radius: 1px;
    cursor: pointer;
    transform-origin: center center;
    transition: box-shadow 0.5s ease;
  }

  .note::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 5%;
    width: 90%;
    height: 1px;
    background: rgba(0,0,0,0.06);
    transform: translateY(-0.5px);
  }

  /* Ghost text visible through the fold — before opening */
  .ghost-text {
    position: absolute;
    top: 28%;
    left: 12%;
    right: 12%;
    font-size: 14px;
    line-height: 1.9;
    color: rgba(0,0,0,0.07);
    transition: opacity 1.5s ease;
    pointer-events: none;
    font-style: italic;
  }

  /* The real text — hidden until unfolded */
  .real-text {
    position: absolute;
    top: 15%;
    left: 12%;
    right: 12%;
    font-size: 14.5px;
    line-height: 1.95;
    color: rgba(0,0,0,0);
    transition: color 3s ease 1s;
    pointer-events: none;
  }

  .real-text .line {
    display: block;
    margin-bottom: 2px;
  }

  .real-text .closing {
    display: block;
    margin-top: 18px;
    font-style: italic;
  }

  /* States */
  .note-container.unfolding .note {
    box-shadow: 1px 2px 12px rgba(0,0,0,0.06);
  }

  .note-container.unfolding .note::before {
    opacity: 0.3;
    transition: opacity 3s ease;
  }

  .note-container.unfolding .ghost-text {
    opacity: 0;
  }

  .note-container.unfolding .real-text {
    color: rgba(40, 35, 28, 0.85);
  }

  /* Instruction */
  .instruction {
    position: fixed;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(0,0,0,0.2);
    letter-spacing: 0.03em;
    transition: opacity 2s ease;
  }

  .instruction.hidden {
    opacity: 0;
  }

  /* After reading — refold prompt */
  .refold-prompt {
    position: fixed;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: rgba(0,0,0,0);
    letter-spacing: 0.03em;
    transition: color 3s ease;
    cursor: pointer;
  }

  .refold-prompt.visible {
    color: rgba(0,0,0,0.2);
  }

  .refold-prompt.visible:hover {
    color: rgba(0,0,0,0.35);
  }

  /* Refolding animation */
  .note-container.refolding .real-text {
    color: rgba(0,0,0,0) !important;
    transition: color 1.5s ease !important;
  }

  .note-container.refolding .ghost-text {
    opacity: 1;
    transition: opacity 2s ease 1.5s;
  }

  .note-container.refolding .note::before {
    opacity: 1;
    transition: opacity 1.5s ease 0.5s;
  }

</style>
</head>
<body>

<div class="note-container" id="container">
  <div class="note" id="note">
    <div class="ghost-text" id="ghost">
      The water takes forty seconds.<br>
      I should have said this sooner.<br>
      Turn the fig on Sundays.
    </div>
    <div class="real-text" id="text">
      <span class="line">The water takes forty seconds but it's worth waiting.</span>
      <span class="line">I should have said this while I was still here —</span>
      <span class="line">the mornings are the best part of this place.</span>
      <span class="closing">S.</span>
    </div>
  </div>
</div>

<div class="instruction" id="instruction">unfold</div>
<div class="refold-prompt" id="refold">fold it back</div>

<script>
  const container = document.getElementById('container');
  const note = document.getElementById('note');
  const instruction = document.getElementById('instruction');
  const refold = document.getElementById('refold');

  let state = 'folded'; // folded, unfolded, refolding

  note.addEventListener('click', () => {
    if (state === 'folded') {
      state = 'unfolded';
      container.classList.add('unfolding');
      container.classList.remove('refolding');
      instruction.classList.add('hidden');

      // Show refold option after text is visible
      setTimeout(() => {
        refold.classList.add('visible');
      }, 5000);
    }
  });

  refold.addEventListener('click', () => {
    if (state === 'unfolded') {
      state = 'refolding';
      container.classList.remove('unfolding');
      container.classList.add('refolding');
      refold.classList.remove('visible');

      // Return to folded state
      setTimeout(() => {
        state = 'folded';
        container.classList.remove('refolding');
        // The ghost text and fold line are back
        // The note can be unfolded again
      }, 4000);
    }
  });
</script>

</body>
</html>
