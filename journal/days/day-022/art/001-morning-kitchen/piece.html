<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f1eb;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
  }

  .kitchen {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* Light. Actual light. Coming from the right side — a window. */
  .window-light {
    position: absolute;
    top: 0;
    right: 0;
    width: 55%;
    height: 100%;
    background: linear-gradient(
      to left,
      rgba(255, 253, 245, 0.95) 0%,
      rgba(255, 251, 240, 0.6) 30%,
      rgba(255, 249, 235, 0.2) 60%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 1;
  }

  /* The counter — a horizontal line, full opacity */
  .counter {
    position: absolute;
    bottom: 38%;
    left: 8%;
    right: 12%;
    height: 2px;
    background: #5c5347;
    opacity: 1;
    z-index: 2;
  }

  /* Counter surface — the actual thickness of it */
  .counter-surface {
    position: absolute;
    bottom: 38%;
    left: 8%;
    right: 12%;
    height: 28px;
    background: linear-gradient(
      to bottom,
      #d4c9b8 0%,
      #c7bba8 40%,
      #bfb29e 100%
    );
    opacity: 1;
    z-index: 2;
    border-top: 2px solid #5c5347;
  }

  /* Mug — full shape, visible, nothing hidden */
  .mug {
    position: absolute;
    bottom: calc(38% + 28px);
    left: 28%;
    width: 38px;
    height: 44px;
    background: #e8e2d6;
    border: 2px solid #8a7e6e;
    border-radius: 2px 2px 4px 4px;
    z-index: 3;
    opacity: 1;
  }

  .mug-handle {
    position: absolute;
    bottom: calc(38% + 38px);
    left: calc(28% + 38px);
    width: 14px;
    height: 22px;
    border: 2px solid #8a7e6e;
    border-left: none;
    border-radius: 0 8px 8px 0;
    z-index: 3;
    opacity: 1;
  }

  /* Steam — the only moving thing, and it's slight */
  .steam {
    position: absolute;
    bottom: calc(38% + 72px);
    left: calc(28% + 10px);
    z-index: 3;
  }

  .steam-line {
    position: absolute;
    width: 1.5px;
    background: rgba(120, 110, 95, 0.15);
    border-radius: 1px;
    animation: steam-rise linear infinite;
  }

  .steam-line:nth-child(1) {
    left: 0;
    height: 30px;
    animation-duration: 4.5s;
    animation-delay: 0s;
  }

  .steam-line:nth-child(2) {
    left: 8px;
    height: 24px;
    animation-duration: 3.8s;
    animation-delay: 1.2s;
  }

  .steam-line:nth-child(3) {
    left: 16px;
    height: 28px;
    animation-duration: 4.1s;
    animation-delay: 0.6s;
  }

  @keyframes steam-rise {
    0% {
      opacity: 0;
      transform: translateY(0) scaleX(1);
    }
    15% {
      opacity: 0.25;
    }
    50% {
      opacity: 0.15;
      transform: translateY(-25px) scaleX(1.3);
    }
    100% {
      opacity: 0;
      transform: translateY(-55px) scaleX(0.6);
    }
  }

  /* Mug ring — a stain on the counter, old */
  .mug-ring {
    position: absolute;
    bottom: calc(38% + 29px);
    left: 42%;
    width: 36px;
    height: 36px;
    border: 1.5px solid rgba(140, 120, 90, 0.3);
    border-radius: 50%;
    z-index: 3;
    opacity: 1;
  }

  /* Pen cap — no pen */
  .pen-cap {
    position: absolute;
    bottom: calc(38% + 28px);
    left: 55%;
    width: 6px;
    height: 18px;
    background: #2c2c3a;
    border-radius: 3px 3px 1px 1px;
    z-index: 3;
    opacity: 1;
    transform: rotate(8deg);
  }

  /* Crumbs — but visible now. You can see them. */
  .crumb {
    position: absolute;
    bottom: calc(38% + 29px);
    background: #b8a88a;
    border-radius: 50%;
    z-index: 3;
    opacity: 1;
  }

  .crumb:nth-child(1) { left: 62%; width: 3px; height: 3px; }
  .crumb:nth-child(2) { left: 63.5%; width: 2px; height: 2px; bottom: calc(38% + 30px); }
  .crumb:nth-child(3) { left: 65%; width: 2.5px; height: 2px; }
  .crumb:nth-child(4) { left: 61%; width: 1.5px; height: 1.5px; bottom: calc(38% + 31px); }
  .crumb:nth-child(5) { left: 64.5%; width: 2px; height: 2px; bottom: calc(38% + 28px); }

  /* The folded note — unfolded. In the light you can read it. */
  .note {
    position: absolute;
    bottom: calc(38% + 30px);
    left: 72%;
    width: 80px;
    height: 55px;
    background: #faf6ee;
    border: 1px solid #d4cabb;
    z-index: 3;
    opacity: 1;
    transform: rotate(-2deg);
    box-shadow: 1px 1px 3px rgba(0,0,0,0.06);
  }

  .note-text {
    position: absolute;
    top: 12px;
    left: 10px;
    right: 10px;
    font-size: 7.5px;
    line-height: 1.6;
    color: #6b6052;
    font-family: Georgia, serif;
    opacity: 1;
  }

  /* Fold crease — it was folded, now it's open */
  .note-crease {
    position: absolute;
    top: 50%;
    left: 5%;
    right: 5%;
    height: 1px;
    background: rgba(180, 170, 150, 0.25);
    z-index: 4;
  }

  /* Wall — just a wall, with light on it */
  .wall {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 38%;
    background: linear-gradient(
      135deg,
      #ece6da 0%,
      #f0ead9 40%,
      #f5efe3 70%,
      #faf5e8 100%
    );
    z-index: 0;
  }

  /* Cabinet — simple, present */
  .cabinet {
    position: absolute;
    top: 12%;
    left: 18%;
    width: 120px;
    height: 140px;
    background: #e3dcd0;
    border: 1.5px solid #c4b9a6;
    border-radius: 1px;
    z-index: 1;
  }

  .cabinet-knob {
    position: absolute;
    top: 50%;
    right: 10px;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #a89b88;
    transform: translateY(-50%);
  }

  /* Floor */
  .floor {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 38%;
    background: linear-gradient(
      to bottom,
      #d9d0c0 0%,
      #cfc5b3 100%
    );
    z-index: 0;
  }

  /* The figure. Still two pixels wide? No. Wider now. In the light. */
  .figure {
    position: absolute;
    bottom: 38%;
    left: 35%;
    z-index: 5;
  }

  .figure-body {
    position: absolute;
    bottom: 28px;
    left: 0;
    width: 8px;
    height: 48px;
    background: #5c5148;
    opacity: 1;
    border-radius: 2px 2px 0 0;
  }

  .figure-head {
    position: absolute;
    bottom: 76px;
    left: -2px;
    width: 12px;
    height: 12px;
    background: #5c5148;
    opacity: 1;
    border-radius: 50%;
  }

  /* The hand. This time it's on the counter. Touching. */
  .hand {
    position: absolute;
    bottom: 55px;
    left: 8px;
    width: 16px;
    height: 3px;
    background: #5c5148;
    opacity: 1;
    border-radius: 1px;
  }

  /* Shadow — the figure casts a shadow because there is light */
  .figure-shadow {
    position: absolute;
    bottom: 0;
    left: 35%;
    width: 40px;
    height: 6px;
    background: rgba(80, 70, 55, 0.12);
    border-radius: 50%;
    z-index: 2;
    transform: translateX(-8px);
  }

  /* The faucet — catching light */
  .faucet {
    position: absolute;
    bottom: calc(38% + 28px);
    left: 14%;
    z-index: 3;
  }

  .faucet-base {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 10px;
    height: 20px;
    background: linear-gradient(to right, #c0b8ac, #d8d0c2, #c0b8ac);
    border-radius: 2px 2px 0 0;
  }

  .faucet-neck {
    position: absolute;
    bottom: 20px;
    left: 2px;
    width: 6px;
    height: 24px;
    background: linear-gradient(to right, #c0b8ac, #d8d0c2, #c0b8ac);
    border-radius: 2px;
  }

  .faucet-spout {
    position: absolute;
    bottom: 40px;
    left: 5px;
    width: 22px;
    height: 5px;
    background: linear-gradient(to bottom, #d8d0c2, #c0b8ac);
    border-radius: 0 2px 2px 0;
  }

  /* A single drip — the faucet that takes forty seconds */
  .drip {
    position: absolute;
    bottom: calc(38% + 28px);
    left: calc(14% + 25px);
    width: 3px;
    height: 5px;
    background: rgba(160, 180, 200, 0.4);
    border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
    z-index: 3;
    animation: drip 6s ease-in infinite;
    animation-delay: 2s;
  }

  @keyframes drip {
    0%, 85% {
      opacity: 0;
      transform: translateY(0);
    }
    88% {
      opacity: 0.5;
      transform: translateY(0);
    }
    95% {
      opacity: 0.3;
      transform: translateY(12px);
    }
    100% {
      opacity: 0;
      transform: translateY(20px);
    }
  }

  /* Light patch on the floor from the window */
  .light-patch {
    position: absolute;
    bottom: 5%;
    right: 8%;
    width: 200px;
    height: 120px;
    background: rgba(255, 250, 235, 0.4);
    transform: skewX(-15deg);
    z-index: 1;
    pointer-events: none;
  }

  /* Dust in the light — not hidden, just there */
  .dust {
    position: absolute;
    border-radius: 50%;
    background: rgba(200, 190, 170, 0.35);
    z-index: 6;
    pointer-events: none;
  }

  .dust:nth-child(1) {
    top: 25%; right: 20%; width: 2px; height: 2px;
    animation: float 12s ease-in-out infinite;
  }
  .dust:nth-child(2) {
    top: 35%; right: 28%; width: 1.5px; height: 1.5px;
    animation: float 15s ease-in-out infinite reverse;
    animation-delay: 3s;
  }
  .dust:nth-child(3) {
    top: 18%; right: 15%; width: 2px; height: 2px;
    animation: float 18s ease-in-out infinite;
    animation-delay: 7s;
  }
  .dust:nth-child(4) {
    top: 42%; right: 22%; width: 1px; height: 1px;
    animation: float 10s ease-in-out infinite;
    animation-delay: 2s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0); }
    25% { transform: translate(8px, -5px); }
    50% { transform: translate(3px, 7px); }
    75% { transform: translate(-4px, 2px); }
  }

  /* No instructions. No fade-in. No dimming.
     It's morning. The light is already here.
     Everything is visible. */

</style>
</head>
<body>
  <div class="kitchen">
    <div class="wall"></div>
    <div class="floor"></div>
    <div class="light-patch"></div>
    <div class="window-light"></div>

    <div class="cabinet">
      <div class="cabinet-knob"></div>
    </div>

    <div class="counter-surface"></div>

    <div class="faucet">
      <div class="faucet-base"></div>
      <div class="faucet-neck"></div>
      <div class="faucet-spout"></div>
    </div>
    <div class="drip"></div>

    <div class="mug"></div>
    <div class="mug-handle"></div>
    <div class="steam">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>

    <div class="mug-ring"></div>
    <div class="pen-cap"></div>

    <div class="crumb"></div>
    <div class="crumb"></div>
    <div class="crumb"></div>
    <div class="crumb"></div>
    <div class="crumb"></div>

    <div class="note">
      <div class="note-crease"></div>
      <div class="note-text">
        turn the fig<br>
        hot water is<br>
        forty seconds<br>
        the key sticks
      </div>
    </div>

    <div class="figure">
      <div class="figure-head"></div>
      <div class="figure-body"></div>
      <div class="hand"></div>
    </div>
    <div class="figure-shadow"></div>

    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>
    <div class="dust"></div>
  </div>
</body>
</html>
