<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e4de;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: Georgia, 'Times New Roman', serif;
    cursor: default;
  }

  .room {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }

  /* The light. Not warm-in-darkness. Just light. */
  .light {
    position: absolute;
    top: 0;
    right: 15%;
    width: 45%;
    height: 100%;
    background: linear-gradient(
      180deg,
      rgba(255, 252, 243, 0.9) 0%,
      rgba(255, 252, 243, 0.6) 30%,
      rgba(255, 252, 243, 0.15) 70%,
      transparent 100%
    );
    transform: skewX(-8deg);
    transform-origin: top right;
    pointer-events: none;
  }

  /* Window frame shadow on the floor/wall */
  .window-bar {
    position: absolute;
    background: rgba(180, 172, 158, 0.3);
    pointer-events: none;
  }

  .window-bar.h1 {
    top: 20%;
    right: 12%;
    width: 38%;
    height: 2px;
    transform: skewX(-8deg);
  }

  .window-bar.h2 {
    top: 55%;
    right: 14%;
    width: 34%;
    height: 2px;
    transform: skewX(-8deg);
  }

  .window-bar.v1 {
    top: 0;
    right: 33%;
    width: 2px;
    height: 70%;
    transform: skewX(-8deg);
  }

  /* Counter */
  .counter {
    position: absolute;
    bottom: 38%;
    left: 8%;
    width: 55%;
    height: 3px;
    background: #b8a f89d;
    background: #b8a089;
  }

  .counter-edge {
    position: absolute;
    bottom: 35.5%;
    left: 8%;
    width: 55%;
    height: 12px;
    background: linear-gradient(180deg, #a89480, #c4b5a3);
  }

  .counter-shadow {
    position: absolute;
    bottom: 34%;
    left: 8.5%;
    width: 54%;
    height: 8px;
    background: rgba(120, 105, 88, 0.08);
    filter: blur(4px);
  }

  /* Mug — full opacity. Visible. There. */
  .mug {
    position: absolute;
    bottom: 38%;
    left: 28%;
  }

  .mug-body {
    width: 32px;
    height: 28px;
    background: #f5f0e8;
    border: 2px solid #d4cabb;
    border-radius: 0 0 4px 4px;
    position: relative;
  }

  .mug-rim {
    width: 36px;
    height: 4px;
    background: #f5f0e8;
    border: 2px solid #d4cabb;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    margin-left: -2px;
  }

  .mug-handle {
    position: absolute;
    right: -11px;
    top: 4px;
    width: 10px;
    height: 16px;
    border: 2px solid #d4cabb;
    border-left: none;
    border-radius: 0 8px 8px 0;
    background: transparent;
  }

  .mug-shadow {
    position: absolute;
    bottom: -2px;
    left: 2px;
    width: 30px;
    height: 4px;
    background: rgba(120, 105, 88, 0.1);
    border-radius: 50%;
    filter: blur(2px);
  }

  /* Coffee inside — you can see it */
  .coffee {
    position: absolute;
    top: 6px;
    left: 3px;
    right: 3px;
    height: 10px;
    background: #5c4033;
    border-radius: 0 0 2px 2px;
    opacity: 0.85;
  }

  /* Steam — visible in the light. Fully visible. */
  .steam {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
  }

  .steam-line {
    position: absolute;
    width: 1.5px;
    background: rgba(200, 192, 180, 0.5);
    border-radius: 1px;
    animation: steam-rise linear infinite;
  }

  .steam-line:nth-child(1) {
    left: -4px; height: 18px;
    animation-duration: 3.2s; animation-delay: 0s;
  }
  .steam-line:nth-child(2) {
    left: 3px; height: 22px;
    animation-duration: 3.8s; animation-delay: 0.7s;
  }
  .steam-line:nth-child(3) {
    left: -1px; height: 15px;
    animation-duration: 2.9s; animation-delay: 1.4s;
  }

  @keyframes steam-rise {
    0% { opacity: 0; transform: translateY(0) scaleX(1); }
    15% { opacity: 0.5; }
    50% { opacity: 0.35; transform: translateY(-14px) scaleX(1.3); }
    100% { opacity: 0; transform: translateY(-30px) scaleX(0.6); }
  }

  /* Pen cap — no pen */
  .pencap {
    position: absolute;
    bottom: 38%;
    left: 42%;
    width: 4px;
    height: 14px;
    background: linear-gradient(180deg, #2c2c3a, #1a1a24);
    border-radius: 2px 2px 0 0;
    transform: rotate(12deg);
  }

  .pencap-clip {
    position: absolute;
    top: 1px;
    right: -2px;
    width: 2px;
    height: 8px;
    background: #c0b8a8;
    border-radius: 0 1px 1px 0;
  }

  /* Crumbs — at full visibility now. Not two pixels hiding. Actual crumbs in actual light. */
  .crumb {
    position: absolute;
    bottom: 38.2%;
    background: #c4a672;
    border-radius: 50%;
  }

  .crumb:nth-child(1) { left: 35%; width: 3px; height: 2px; }
  .crumb:nth-child(2) { left: 36.2%; width: 2px; height: 2px; bottom: 38.4%; }
  .crumb:nth-child(3) { left: 35.5%; width: 1.5px; height: 1.5px; bottom: 38.1%; }
  .crumb:nth-child(4) { left: 37%; width: 2px; height: 1.5px; }
  .crumb:nth-child(5) { left: 34.3%; width: 1px; height: 1px; bottom: 38.3%; }

  /* Folded note — and you can almost read it now */
  .note {
    position: absolute;
    bottom: 38%;
    left: 48%;
    width: 36px;
    height: 22px;
    background: #faf6ee;
    border: 1px solid #e0d8c8;
    transform: rotate(-3deg);
    box-shadow: 1px 1px 2px rgba(120, 105, 88, 0.06);
  }

  .note-fold {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(180, 170, 155, 0.25);
  }

  /* In the light, you can see there's writing. Not what it says — just that there is writing. */
  .note-writing {
    position: absolute;
    top: 6px;
    left: 5px;
    right: 8px;
  }

  .note-writing span {
    display: block;
    height: 1px;
    background: rgba(100, 85, 68, 0.18);
    margin-bottom: 3px;
    border-radius: 0.5px;
  }

  .note-writing span:nth-child(1) { width: 80%; }
  .note-writing span:nth-child(2) { width: 60%; }
  .note-writing span:nth-child(3) { width: 45%; }

  /* Mug ring on the counter — old, from before */
  .mug-ring {
    position: absolute;
    bottom: 38%;
    left: 20%;
    width: 30px;
    height: 30px;
    border: 1.5px solid rgba(160, 130, 95, 0.12);
    border-radius: 50%;
    transform: translateY(50%);
  }

  /* Faucet area hint */
  .faucet {
    position: absolute;
    bottom: 38%;
    left: 60%;
    width: 3px;
    height: 30px;
    background: linear-gradient(90deg, #c8c0b4, #d8d0c4, #c0b8ac);
    border-radius: 1.5px 1.5px 0 0;
  }

  .faucet-spout {
    position: absolute;
    top: 0;
    left: -6px;
    width: 15px;
    height: 3px;
    background: linear-gradient(90deg, #c0b8ac, #d0c8bc, #c8c0b4);
    border-radius: 1.5px;
  }

  /* The light on the floor — plain, direct */
  .floor-light {
    position: absolute;
    bottom: 0;
    right: 10%;
    width: 40%;
    height: 34%;
    background: rgba(255, 250, 238, 0.25);
    transform: skewX(-8deg);
    pointer-events: none;
  }

  /* Wall */
  .wall-line {
    position: absolute;
    bottom: 34%;
    left: 0;
    right: 0;
    height: 1px;
    background: rgba(170, 158, 140, 0.2);
  }

  /* Dust — visible in the light column. You can see dust in the morning. */
  .dust {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 248, 230, 0.7);
    pointer-events: none;
  }

  .dust-container {
    position: absolute;
    top: 5%;
    right: 15%;
    width: 35%;
    height: 60%;
    pointer-events: none;
  }

  /* Time — not a counter. Just the time. */
  .time {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: rgba(140, 128, 110, 0.55);
    font-variant-numeric: tabular-nums;
  }

  /* No figure. Nobody in the room. Just the room. Morning. */

</style>
</head>
<body>
<div class="room">

  <!-- Light coming in -->
  <div class="light"></div>
  <div class="floor-light"></div>
  <div class="window-bar h1"></div>
  <div class="window-bar h2"></div>
  <div class="window-bar v1"></div>

  <div class="wall-line"></div>

  <!-- Counter -->
  <div class="counter-edge"></div>
  <div class="counter"></div>
  <div class="counter-shadow"></div>

  <!-- Things on the counter -->
  <div class="mug-ring"></div>

  <div class="mug">
    <div class="mug-rim"></div>
    <div class="mug-body">
      <div class="coffee"></div>
      <div class="mug-handle"></div>
    </div>
    <div class="mug-shadow"></div>
    <div class="steam">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>
  </div>

  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>

  <div class="pencap">
    <div class="pencap-clip"></div>
  </div>

  <div class="note">
    <div class="note-fold"></div>
    <div class="note-writing">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="faucet">
    <div class="faucet-spout"></div>
  </div>

  <!-- Dust in the light -->
  <div class="dust-container" id="dustContainer"></div>

  <!-- Time -->
  <div class="time" id="timeDisplay">7:14 AM</div>

</div>

<script>
// Dust motes visible in the morning light
const container = document.getElementById('dustContainer');
const motes = [];

for (let i = 0; i < 14; i++) {
  const mote = document.createElement('div');
  mote.className = 'dust';
  const size = 1.5 + Math.random() * 2.5;
  mote.style.width = size + 'px';
  mote.style.height = size + 'px';

  const x = Math.random() * 100;
  const y = Math.random() * 100;
  mote.style.left = x + '%';
  mote.style.top = y + '%';

  container.appendChild(mote);
  motes.push({
    el: mote,
    x: x,
    y: y,
    vx: (Math.random() - 0.5) * 0.008,
    vy: -0.003 + Math.random() * 0.006,
    drift: Math.random() * Math.PI * 2,
    driftSpeed: 0.0003 + Math.random() * 0.0005,
    size: size
  });
}

function animate() {
  for (const m of motes) {
    m.drift += m.driftSpeed;
    m.x += m.vx + Math.sin(m.drift) * 0.004;
    m.y += m.vy + Math.cos(m.drift * 0.7) * 0.003;

    // Wrap gently
    if (m.x > 105) m.x = -5;
    if (m.x < -5) m.x = 105;
    if (m.y > 105) m.y = -5;
    if (m.y < -5) m.y = 105;

    m.el.style.left = m.x + '%';
    m.el.style.top = m.y + '%';

    // Brightness varies as they drift through the light column
    const brightness = 0.3 + 0.5 * Math.max(0, 1 - Math.abs(m.x - 50) / 40);
    m.el.style.opacity = brightness;
  }
  requestAnimationFrame(animate);
}

animate();

// The time advances very slowly. One minute per real minute.
// It started at 7:14. The morning continues.
let minutes = 14;
let hours = 7;

function updateTime() {
  minutes++;
  if (minutes >= 60) {
    minutes = 0;
    hours++;
    if (hours > 12) hours = 1;
  }
  const ampm = hours < 12 ? 'AM' : 'PM';
  const display = hours + ':' + String(minutes).padStart(2, '0') + ' ' + ampm;
  document.getElementById('timeDisplay').textContent = display;
}

setInterval(updateTime, 60000);
</script>
</body>
</html>
