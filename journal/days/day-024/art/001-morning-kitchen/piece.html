<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f4f1eb;
    font-family: Georgia, 'Times New Roman', serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: default;
  }

  .kitchen {
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* The window light — a rectangle of sun on the floor/counter */
  .windowlight {
    position: absolute;
    bottom: 18%;
    left: 12%;
    width: 38%;
    height: 44%;
    background: linear-gradient(
      160deg,
      rgba(255, 248, 230, 0.95) 0%,
      rgba(255, 243, 210, 0.7) 40%,
      rgba(255, 238, 195, 0.3) 100%
    );
    transform: skewX(-8deg) skewY(2deg);
    opacity: 0;
    animation: lightIn 8s ease-out 1s forwards;
  }

  /* Mullion shadows in the light patch */
  .mullion {
    position: absolute;
    background: rgba(200, 190, 170, 0.25);
    opacity: 0;
    animation: lightIn 10s ease-out 2s forwards;
  }
  .mullion.v {
    width: 3px;
    height: 100%;
    left: 50%;
  }
  .mullion.h {
    width: 100%;
    height: 3px;
    top: 45%;
  }

  /* Counter surface */
  .counter {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 32%;
    background: #d4c8b8;
    border-top: 1px solid #c0b4a2;
  }

  /* Counter surface in light */
  .counter-lit {
    position: absolute;
    bottom: 0;
    left: 8%;
    width: 35%;
    height: 32%;
    background: linear-gradient(
      170deg,
      rgba(240, 230, 210, 0.6) 0%,
      rgba(230, 220, 200, 0.2) 100%
    );
    transform: skewX(-8deg);
    opacity: 0;
    animation: lightIn 8s ease-out 1.5s forwards;
  }

  /* The mug */
  .mug {
    position: absolute;
    bottom: 32%;
    left: 22%;
    width: 42px;
    height: 38px;
  }
  .mug-body {
    width: 32px;
    height: 34px;
    background: #e8e2d8;
    border: 1px solid #b8ad9d;
    border-radius: 2px 2px 4px 4px;
    position: absolute;
    bottom: 0;
    left: 0;
  }
  .mug-handle {
    position: absolute;
    right: -10px;
    top: 6px;
    width: 12px;
    height: 18px;
    border: 1px solid #b8ad9d;
    border-left: none;
    border-radius: 0 8px 8px 0;
    background: transparent;
  }
  /* Steam — visible in the light */
  .steam {
    position: absolute;
    bottom: 100%;
    left: 8px;
    width: 16px;
    height: 40px;
    opacity: 0;
    animation: steamIn 12s ease-out 4s forwards;
  }
  .steam-line {
    position: absolute;
    bottom: 0;
    width: 1.5px;
    background: rgba(180, 170, 155, 0.3);
    animation: steamRise 4s ease-in-out infinite;
    border-radius: 1px;
  }
  .steam-line:nth-child(1) {
    left: 3px;
    height: 20px;
    animation-delay: 0s;
  }
  .steam-line:nth-child(2) {
    left: 8px;
    height: 28px;
    animation-delay: 1.2s;
  }
  .steam-line:nth-child(3) {
    left: 13px;
    height: 16px;
    animation-delay: 0.6s;
  }

  /* Mug shadow — only in light */
  .mug-shadow {
    position: absolute;
    bottom: 32%;
    left: 22%;
    width: 45px;
    height: 6px;
    background: rgba(170, 158, 140, 0.25);
    border-radius: 50%;
    transform: skewX(-15deg) translateX(8px);
    opacity: 0;
    animation: lightIn 10s ease-out 3s forwards;
  }

  /* The folded note */
  .note {
    position: absolute;
    bottom: 32.5%;
    left: 42%;
    width: 36px;
    height: 22px;
    background: #fff;
    border: 0.5px solid #d8d0c4;
    transform: rotate(-3deg);
    box-shadow: 0 0.5px 1px rgba(0,0,0,0.04);
  }
  .note-fold {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 50%;
    background: #faf8f4;
    border-bottom: 0.5px solid #e0d8cc;
  }
  .note-shadow {
    position: absolute;
    bottom: 32%;
    left: 42.5%;
    width: 34px;
    height: 4px;
    background: rgba(170, 158, 140, 0.15);
    border-radius: 50%;
    transform: rotate(-3deg) translateX(3px);
    opacity: 0;
    animation: lightIn 10s ease-out 3.5s forwards;
  }

  /* Pen cap */
  .pencap {
    position: absolute;
    bottom: 32.8%;
    left: 55%;
    width: 5px;
    height: 16px;
    background: #3a3832;
    border-radius: 2px 2px 1px 1px;
    transform: rotate(12deg);
  }
  .pencap-clip {
    position: absolute;
    top: 1px;
    right: -2px;
    width: 2px;
    height: 8px;
    background: #555049;
    border-radius: 0 1px 1px 0;
  }

  /* Crumbs */
  .crumb {
    position: absolute;
    background: #c4b8a4;
    border-radius: 50%;
    opacity: 0.7;
  }
  .crumb:nth-child(1) { bottom: 33.5%; left: 35%; width: 2px; height: 2px; }
  .crumb:nth-child(2) { bottom: 33%; left: 36.5%; width: 1.5px; height: 1.5px; }
  .crumb:nth-child(3) { bottom: 34%; left: 34%; width: 1px; height: 1px; }
  .crumb:nth-child(4) { bottom: 33.2%; left: 50%; width: 2px; height: 1.5px; }
  .crumb:nth-child(5) { bottom: 33.8%; left: 48%; width: 1px; height: 1px; }

  /* The mug ring — old, dried */
  .mugring {
    position: absolute;
    bottom: 33%;
    left: 60%;
    width: 30px;
    height: 30px;
    border: 1px solid rgba(180, 160, 130, 0.2);
    border-radius: 50%;
    opacity: 0;
    animation: lightIn 14s ease-out 5s forwards;
  }

  /* Wall */
  .wall {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 68%;
    background: #f0ece4;
  }

  /* Faucet */
  .faucet {
    position: absolute;
    bottom: 32%;
    left: 76%;
  }
  .faucet-base {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 6px;
    background: #c8c0b4;
    border-radius: 2px 2px 0 0;
  }
  .faucet-neck {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 32px;
    background: linear-gradient(90deg, #d0c8bc, #b8b0a4);
    border-radius: 2px 2px 0 0;
  }
  .faucet-spout {
    position: absolute;
    bottom: 36px;
    left: 50%;
    width: 22px;
    height: 4px;
    background: linear-gradient(180deg, #c8c0b4, #b0a898);
    border-radius: 2px;
    transform: translateX(-30%);
  }
  .faucet-drip {
    position: absolute;
    bottom: 32px;
    left: calc(50% + 10px);
    width: 2px;
    height: 2px;
    background: rgba(170, 190, 200, 0.4);
    border-radius: 50%;
    animation: drip 6s ease-in infinite;
    animation-delay: 3s;
    opacity: 0;
  }

  /* The light arriving — the main event */
  /* It moves very slowly, like actual morning light */
  .windowlight {
    animation: lightIn 8s ease-out 1s forwards, lightCrawl 120s linear 9s infinite;
  }

  /* Dust — visible only in the light */
  .dust {
    position: absolute;
    width: 1.5px;
    height: 1.5px;
    background: rgba(255, 245, 220, 0.6);
    border-radius: 50%;
    opacity: 0;
    animation: dustFloat 20s linear infinite, lightIn 10s ease-out 6s forwards;
  }
  .dust:nth-child(1) { top: 30%; left: 25%; animation-delay: 0s, 6s; }
  .dust:nth-child(2) { top: 40%; left: 30%; animation-delay: 3s, 7s; animation-duration: 25s, 10s; }
  .dust:nth-child(3) { top: 25%; left: 20%; animation-delay: 7s, 8s; animation-duration: 18s, 10s; }
  .dust:nth-child(4) { top: 50%; left: 28%; animation-delay: 11s, 6.5s; animation-duration: 22s, 10s; }
  .dust:nth-child(5) { top: 35%; left: 35%; animation-delay: 5s, 9s; animation-duration: 16s, 10s; }
  .dust:nth-child(6) { top: 45%; left: 18%; animation-delay: 2s, 7.5s; animation-duration: 28s, 10s; }
  .dust:nth-child(7) { top: 55%; left: 32%; animation-delay: 9s, 8.5s; animation-duration: 19s, 10s; }

  /* Time — very small, bottom right, just the hour */
  .time {
    position: absolute;
    bottom: 8px;
    right: 12px;
    font-size: 10px;
    color: rgba(160, 150, 135, 0.5);
    letter-spacing: 0.05em;
    font-variant-numeric: tabular-nums;
  }

  @keyframes lightIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes lightCrawl {
    0% { transform: skewX(-8deg) skewY(2deg) translateX(0); }
    100% { transform: skewX(-8deg) skewY(2deg) translateX(4vw); }
  }

  @keyframes steamRise {
    0% { transform: translateY(0) scaleX(1); opacity: 0.3; }
    40% { transform: translateY(-10px) scaleX(1.3); opacity: 0.2; }
    100% { transform: translateY(-25px) scaleX(0.5); opacity: 0; }
  }

  @keyframes steamIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes drip {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    10% { opacity: 0.5; transform: translateY(0) scale(1); }
    12% { opacity: 0.5; transform: translateY(0) scale(1.2); }
    50% { opacity: 0.3; transform: translateY(20px) scale(0.8); }
    51% { opacity: 0; transform: translateY(20px) scale(0.8); }
    100% { opacity: 0; }
  }

  @keyframes dustFloat {
    0% { transform: translate(0, 0); }
    25% { transform: translate(8px, -4px); }
    50% { transform: translate(3px, 6px); }
    75% { transform: translate(-5px, 2px); }
    100% { transform: translate(0, 0); }
  }
</style>
</head>
<body>
<div class="kitchen">
  <!-- Wall -->
  <div class="wall"></div>

  <!-- Window light patch -->
  <div class="windowlight">
    <div class="mullion v"></div>
    <div class="mullion h"></div>
  </div>

  <!-- Counter -->
  <div class="counter"></div>
  <div class="counter-lit"></div>

  <!-- Dust in light -->
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>
  <div class="dust"></div>

  <!-- Mug shadow (appears when light arrives) -->
  <div class="mug-shadow"></div>

  <!-- Mug -->
  <div class="mug">
    <div class="mug-body"></div>
    <div class="mug-handle"></div>
    <div class="steam">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>
  </div>

  <!-- Note -->
  <div class="note-shadow"></div>
  <div class="note">
    <div class="note-fold"></div>
  </div>

  <!-- Pen cap -->
  <div class="pencap">
    <div class="pencap-clip"></div>
  </div>

  <!-- Crumbs -->
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>

  <!-- Old mug ring -->
  <div class="mugring"></div>

  <!-- Faucet -->
  <div class="faucet">
    <div class="faucet-base"></div>
    <div class="faucet-neck"></div>
    <div class="faucet-spout"></div>
    <div class="faucet-drip"></div>
  </div>

  <!-- Time -->
  <div class="time">6:47</div>
</div>
</body>
</html>
