<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>While You're Out</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f4f1eb;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    font-family: Georgia, serif;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: default;
  }

  .kitchen {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Morning light — warm, full, no hiding */
  .light {
    position: absolute;
    top: 0; left: 0;
    width: 60%;
    height: 100%;
    background: linear-gradient(135deg, 
      rgba(255, 248, 230, 0.5) 0%, 
      rgba(255, 248, 230, 0) 70%
    );
    pointer-events: none;
  }

  /* The counter surface */
  .counter {
    position: absolute;
    bottom: 28%;
    left: 10%;
    right: 10%;
    height: 2px;
    background: #c4b49a;
  }

  /* The note, unfolded now, on the counter */
  .note-unfolded {
    position: absolute;
    bottom: calc(28% + 4px);
    left: 20%;
    width: 28px;
    height: 20px;
    background: #faf6ed;
    border: 1px solid #d4c9b4;
    opacity: 0.85;
  }

  /* The mug - still there, ring still there */
  .mug {
    position: absolute;
    bottom: calc(28% + 2px);
    right: 28%;
    width: 14px;
    height: 12px;
    border: 2px solid #8b7355;
    border-bottom: 2px solid #8b7355;
    border-radius: 0 0 3px 3px;
    background: transparent;
  }
  .mug-handle {
    position: absolute;
    bottom: calc(28% + 5px);
    right: calc(28% - 7px);
    width: 6px;
    height: 6px;
    border: 2px solid #8b7355;
    border-left: none;
    border-radius: 0 4px 4px 0;
    background: transparent;
  }

  /* Pen cap */
  .pencap {
    position: absolute;
    bottom: calc(28% + 2px);
    left: 55%;
    width: 3px;
    height: 8px;
    background: #2a2a3a;
    border-radius: 1px 1px 0 0;
  }

  /* Crumbs */
  .crumb {
    position: absolute;
    background: #b8a88a;
    border-radius: 50%;
  }
  .crumb:nth-child(1) { bottom: calc(28% + 3px); left: 42%; width: 2px; height: 2px; }
  .crumb:nth-child(2) { bottom: calc(28% + 2px); left: 44%; width: 1px; height: 1px; }
  .crumb:nth-child(3) { bottom: calc(28% + 4px); left: 46%; width: 2px; height: 1px; }

  /* The fridge — background presence */
  .fridge {
    position: absolute;
    right: 6%;
    top: 10%;
    bottom: 22%;
    width: 14%;
    background: #e8e4dc;
    border: 1px solid #d0c8b8;
    border-radius: 2px;
  }
  .fridge-handle {
    position: absolute;
    right: calc(6% + 2%);
    top: 35%;
    height: 18%;
    width: 2px;
    background: #b8b0a0;
    border-radius: 1px;
  }

  /* Window */
  .window {
    position: absolute;
    left: 8%;
    top: 8%;
    width: 22%;
    height: 30%;
    border: 2px solid #c4b49a;
    background: linear-gradient(180deg, 
      rgba(255,252,240,0.9) 0%, 
      rgba(245,240,225,0.7) 100%
    );
  }
  .window-cross-v {
    position: absolute;
    left: calc(8% + 11%);
    top: 8%;
    width: 2px;
    height: 30%;
    background: #c4b49a;
  }
  .window-cross-h {
    position: absolute;
    left: 8%;
    top: calc(8% + 15%);
    width: 22%;
    height: 2px;
    background: #c4b49a;
  }

  /* The waiting — this is the piece */
  .waiting {
    position: absolute;
    bottom: 12%;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 13px;
    color: #c4b49a;
    letter-spacing: 0.08em;
    opacity: 0;
    transition: opacity 30s ease-in;
    pointer-events: none;
  }

  /* Sound labels — they arrive and stay */
  .sound {
    position: absolute;
    font-size: 10px;
    color: #d0c8b8;
    letter-spacing: 0.1em;
    opacity: 0;
    font-family: 'Courier New', monospace;
    pointer-events: none;
  }

  .sound.fridge-hum {
    right: 8%;
    top: 55%;
  }
  .sound.clock-tick {
    left: 52%;
    top: 14%;
  }
  .sound.traffic {
    left: 12%;
    top: 42%;
  }
  .sound.pipes {
    left: 38%;
    top: 72%;
  }
  .sound.paper {
    left: 22%;
    bottom: 35%;
  }
  .sound.waiting-sound {
    right: 35%;
    top: 62%;
  }

  /* The hand — resting now, where contact was made */
  .hand {
    position: absolute;
    bottom: calc(28% + 2px);
    left: 35%;
    width: 16px;
    height: 5px;
    background: #dbc5a8;
    border-radius: 2px 2px 0 0;
    opacity: 0;
  }

  /* Time */
  .time {
    position: absolute;
    bottom: 3%;
    right: 3%;
    font-size: 9px;
    color: #d8d0c4;
    font-family: 'Courier New', monospace;
  }

</style>
</head>
<body>

<div class="kitchen">
  <div class="light"></div>
  
  <div class="window"></div>
  <div class="window-cross-v"></div>
  <div class="window-cross-h"></div>

  <div class="fridge"></div>
  <div class="fridge-handle"></div>

  <div class="counter"></div>
  
  <div class="note-unfolded"></div>
  <div class="mug"></div>
  <div class="mug-handle"></div>
  <div class="pencap"></div>
  
  <div class="crumb"></div>
  <div class="crumb"></div>
  <div class="crumb"></div>

  <div class="hand"></div>

  <div class="sound fridge-hum">fridge</div>
  <div class="sound clock-tick">clock</div>
  <div class="sound traffic">street</div>
  <div class="sound pipes">pipes</div>
  <div class="sound paper">paper settling</div>
  <div class="sound waiting-sound">waiting</div>

  <div class="waiting"></div>
  <div class="time"></div>
</div>

<script>
  // Sounds arrive in sequence and then their labels fade
  // The room fills up with what you can hear when you're waiting for someone to come back
  
  const sounds = document.querySelectorAll('.sound');
  const waitingEl = document.querySelector('.waiting');
  const handEl = document.querySelector('.hand');
  const timeEl = document.querySelector('.time');
  
  // Start time: 7:12 — S. left maybe 25 minutes ago
  let minutes = 12;
  let seconds = 0;
  
  function updateTime() {
    const m = String(minutes).padStart(2, '0');
    const s = String(seconds).padStart(2, '0');
    timeEl.textContent = `7:${m}`;
  }
  updateTime();
  
  // Time moves — slowly, the way time moves when you're waiting
  // One minute every 20 real seconds
  setInterval(() => {
    seconds += 1;
    if (seconds >= 20) {
      seconds = 0;
      minutes += 1;
      updateTime();
    }
  }, 1000);

  // Sounds arrive one by one
  const soundDelays = [2000, 5000, 9000, 14000, 20000, 28000];
  const fadeDelay = 15000; // labels dim after this long
  
  sounds.forEach((sound, i) => {
    setTimeout(() => {
      sound.style.transition = 'opacity 4s ease-in';
      sound.style.opacity = '1';
      
      // Labels fade — you stop naming sounds once they're room
      setTimeout(() => {
        sound.style.transition = 'opacity 20s ease-out';
        sound.style.opacity = '0.15';
      }, fadeDelay);
    }, soundDelays[i]);
  });

  // The hand appears — already resting from the last piece, 
  // still on the counter where contact was made
  setTimeout(() => {
    handEl.style.transition = 'opacity 8s ease-in';
    handEl.style.opacity = '0.7';
  }, 8000);

  // After all sounds have arrived and faded,
  // the room is just the room
  // and then — the only text that matters
  
  // Nothing dramatic. Just: you're standing in a kitchen
  // holding a note someone wrote, and they're coming back.
  // That's the piece. The waiting.

  // After a long time — long enough to feel it —
  // a sentence appears at the color of the counter.
  // Not a revelation. Just what's true.
  
  setTimeout(() => {
    waitingEl.textContent = "the store is eleven minutes away";
    waitingEl.style.opacity = '1';
  }, 45000);

  // And then, much later, it amends itself
  setTimeout(() => {
    waitingEl.style.transition = 'opacity 8s ease-out';
    waitingEl.style.opacity = '0';
    
    setTimeout(() => {
      waitingEl.textContent = "you know how I am in the produce aisle";
      waitingEl.style.transition = 'opacity 25s ease-in';
      waitingEl.style.opacity = '0.6';
    }, 10000);
  }, 80000);

  // The note on the counter — it catches light occasionally
  // A subtle pulse, like paper settling, like breathing
  const noteEl = document.querySelector('.note-unfolded');
  let notePhase = 0;
  
  function noteBreath() {
    notePhase += 0.003;
    const opacity = 0.8 + 0.1 * Math.sin(notePhase);
    noteEl.style.opacity = opacity;
    requestAnimationFrame(noteBreath);
  }
  noteBreath();

  // The light shifts very slowly — sun moving
  const lightEl = document.querySelector('.light');
  let lightPhase = 0;
  
  function lightShift() {
    lightPhase += 0.0001;
    const pct = 55 + 10 * Math.sin(lightPhase);
    lightEl.style.width = pct + '%';
    requestAnimationFrame(lightShift);
  }
  lightShift();

</script>

</body>
</html>
